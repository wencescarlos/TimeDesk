; ==========================================================
; Estación Meteorológica ESP8266 - PlatformIO
; ==========================================================
; Hardware: ESP8266 (NodeMCU/Wemos D1 Mini) + ILI9341 TFT + XPT2046 Touch
; ==========================================================

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino

monitor_speed = 115200
board_build.f_cpu = 160000000L
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m2m.ld

lib_deps =
    thingpulse/ESP8266 Weather Station@^2.2.0
    squix78/Mini Grafx@^1.0.0
    squix78/JsonStreamingParser@^1.0.5
    paulstoffregen/XPT2046_Touchscreen
    bblanchon/ArduinoJson@^6.21.0

build_flags =
    -D ARDUINO_ESP8266_NODEMCU
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -w

upload_speed = 921600
